# ============================================================================
# Cathode CI — Build all NixOS configs & push to Cachix
# ============================================================================
#
# Cachix Setup (one-time):
#   1. nix profile install nixpkgs#cachix
#   2. cachix authtoken <token-from-cachix>
#   3. cachix create cathode
#   4. Add CACHIX_AUTH_TOKEN to GitHub repo secrets (Settings → Secrets → Actions)
#   5. Enable cathode.cachix.enable = true in host configs (already done)
# ============================================================================

name: CI

on:
  push:
    branches: [master, "feature/*"]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.host }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # m1n1x excluded — requires Asahi firmware not available in CI
        include:
          - host: mininix
            system: x86_64-linux
            runner: ubuntu-latest
          - host: closetcard
            system: x86_64-linux
            runner: ubuntu-latest
          - host: grassblock
            system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Cache nix store
        uses: DeterminateSystems/flakehub-cache-action@v1

      - name: Configure Cachix
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cachix/cachix-action@v16
        with:
          name: cathode
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }}
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel --print-build-logs
